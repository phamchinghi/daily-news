# GitHub Actions: chạy script tổng hợp tin mỗi sáng 7h VN time.
#
# Múi giờ: VN = UTC+7, nên 7h VN = 0h UTC -> cron "0 0 * * *"
# Lưu ý: GitHub Actions cron có thể delay vài phút trong giờ cao điểm,
# thường <10 phút. Nếu cần đúng giờ tuyệt đối, dùng EventBridge AWS.

name: Daily News Post

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 07:00 Asia/Ho_Chi_Minh
  workflow_dispatch:       # Cho phép trigger thủ công từ UI
    inputs:
      dry_run:
        description: "Dry run (skip Facebook posting)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Vietnamese fonts (Be Vietnam Pro)
        run: |
          mkdir -p fonts
          # Tải Be Vietnam Pro từ Google Fonts API
          curl -sL "https://github.com/google/fonts/raw/main/ofl/bevietnampro/BeVietnamPro-Regular.ttf" \
            -o fonts/BeVietnamPro-Regular.ttf
          curl -sL "https://github.com/google/fonts/raw/main/ofl/bevietnampro/BeVietnamPro-Bold.ttf" \
            -o fonts/BeVietnamPro-Bold.ttf
          ls -la fonts/

      - name: Run daily news pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          TZ: Asia/Ho_Chi_Minh
        run: python run_daily.py

      - name: Upload generated cards (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-cards-${{ github.run_number }}
          path: daily_output/
          retention-days: 7
